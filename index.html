<title>Astros Wallpapers</title>
<style>
    body {
        margin: 0;
        background: linear-gradient(to bottom, #000000 0%, #1a75ff 60%, #000000 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
        text-align: center;
       }
      /* الرابط */
.main-link {
    display: block;
    text-align: center;
    margin: 40px auto;
    width: fit-content;
    font-size: 34px;
    font-weight: bold;
    padding: 14px 24px;
    color: white;
    text-decoration: none;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 10px rgba(0,150,255,0.5);
    transition: 0.3s;
}

.main-link:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #00aaff, 0 0 40px #0066ff;

}



    /* حاوية الشبكة */
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    /* بطاقة الصورة */
    .card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 20px #00aaff;
    }

    .card img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    /* أزرار التنزيل */
    .btn {
        cursor: pointer;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .dl-single {
        width: 100%;
        padding: 8px;
        background: #007bff;
        color: white;
    }

    .dl-single:hover {
        background: #00ffcc;
        color: #000;
    }

    .dl-all {
        padding: 15px 30px;
        background: linear-gradient(45deg, #ff8c00, #ff0055);
        color: white;
        font-size: 18px;
        margin: 20px 0;
    }

    .main-link {
        display: inline-block;
        margin: 40px 0;
        color: #66ccff;
        text-decoration: none;
    }
/* العنوان */
h1 {
    margin-top: 20px;
    color: #66ccff;
    text-shadow: 0 0 10px #0099ff;
    position: relative;
    z-index: 1;
}

    const gallery = document.getElementById('gallery');

    // وظيفة لتحميل صورة واحدة
    async function downloadImg(url, filename) {
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
        } catch(e) { alert("حدث خطأ في التنزيل"); }
    }

    // بناء الشبكة
    imageUrls.forEach((url, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${url}" loading="lazy">
            <button class="btn dl-single" onclick="downloadImg('${url}', 'Astros_${i+1}.jpg')">تنزيل 📥</button>
        `;
        gallery.appendChild(card);
    });

    // تحميل الكل
    document.getElementById('downloadAll').onclick = async function() {
        if(!confirm("سيتم تحميل " + imageUrls.length + " صورة، هل تود الاستمرار؟")) return;
        for(let i=0; i<imageUrls.length; i++) {
            await downloadImg(imageUrls[i], `Astros_${i+1}.jpg`);
            await new Promise(r => setTimeout(r, 500)); // تأخير بسيط لتجنب تعليق المتصفح
        }
    };
