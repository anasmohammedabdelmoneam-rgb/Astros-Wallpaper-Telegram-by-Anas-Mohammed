<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Astros wallpaper</title>

<style>
body {
    margin: 0;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #000000 0%, #1a75ff 60%, #000000 100%);
    font-family: Arial, sans-serif;
}

/* إضاءة خلفية */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(0,150,255,0.15), transparent 60%);
    animation: glowMove 10s infinite alternate;
    z-index: 0;
}

@keyframes glowMove {
    0% { transform: translate(-10%, -10%); }
    100% { transform: translate(10%, 10%); }
}

/* 🔥 Watermark */
.watermark {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
}

.watermark::before {
    content: "Astros Wallpaper   Astros Wallpaper   Astros Wallpaper   Astros Wallpaper   Astros Wallpaper   Astros Wallpaper   Astros Wallpaper";
    position: absolute;
    width: 200%;
    height: 200%;
    font-size: 70px;
    font-weight: bold;
    color: rgba(255,255,255,0.12);
    white-space: nowrap;
    transform: rotate(-25deg);
    line-height: 120px;

    /* 🔥 Glow */
    text-shadow: 0 0 10px rgba(0,150,255,0.4);

    animation: moveWM 25s linear infinite;
}

@keyframes moveWM {
    0% { transform: translateX(-30%) rotate(-25deg); }
    100% { transform: translateX(30%) rotate(-25deg); }
}

/* المحتوى */
.content {
    position: relative;
    z-index: 2;
}

h1 {
    text-align: center;
    margin-top: 20px;
    color: #66ccff;
    text-shadow: 0 0 10px #0099ff, 0 0 20px #0066ff;
}

h2, h3 {
    text-align: center;
    color: white;
}

/* Grid */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 25px;
}

/* الصور */
img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.4s;
    box-shadow: 0 0 10px rgba(0,150,255,0.4);
}

img:hover {
    transform: scale(1.07) translateY(-5px);
    box-shadow: 0 0 20px #00aaff, 0 0 40px #0066ff;
}

/* الرابط */
.main-link {
    display: block;
    text-align: center;
    margin: 40px auto;
    width: fit-content;
    font-size: 34px;
    font-weight: bold;
    padding: 14px 24px;
    color: white;
    text-decoration: none;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    box-shadow: 0 0 10px rgba(0,150,255,0.5);
    transition: 0.3s;
}

.main-link:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px #00aaff, 0 0 40px #0066ff;
}
</style>
</head>
